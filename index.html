<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA - Experiencia Inteligente</title>
<style>
/* =========================================
RESET Y ESTILOS BASE
========================================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html, body {
    height: 100%;
    width: 100%;
}

body {
    overflow: hidden;
    min-height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a, #111827);
    color: white;
    transition: 1s;
    position: relative;
}

canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.loader {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(2rem, 6vw, 4rem);
    z-index: 9999;
    animation: fadeOut 2s forwards;
    animation-delay: 2s;
}

@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

.container {
    position: relative;
    width: min(92%, 950px);
    margin: auto;
    top: 50%;
    transform: translateY(-50%);
    padding: clamp(20px, 4vw, 40px);
    border-radius: 30px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    text-align: center;
}

h1 { font-size: clamp(2.5rem, 7vw, 5rem); margin-bottom: 15px; }
h2 { margin-top: 25px; margin-bottom: 10px; font-size: clamp(1.2rem, 3vw, 2rem); }
p { color: #d1d5db; margin-bottom: 20px; line-height: 1.6; }

input, select, button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 15px;
    font-size: 1rem;
}

button {
    cursor: pointer;
    background: #38bdf8;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}
button:hover { transform: scale(1.04); box-shadow: 0 0 20px rgba(56,189,248,0.5); }
button:active { transform: scale(0.97); }

.mode-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 12px;
    margin-top: 15px;
}

.particle {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: particleFade 1s linear forwards;
}
@keyframes particleFade {
    to { transform: translateY(-25px) scale(0); opacity: 0; }
}

.aura-ai {
    margin-top: 25px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    animation: aiGlow 4s infinite alternate;
}
@keyframes aiGlow {
    from { box-shadow: 0 0 10px rgba(0,255,255,0.2); }
    to { box-shadow: 0 0 30px rgba(0,255,255,0.6); }
}

.stats {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 15px;
}
.stats p {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    font-weight: bold;
}

.cyberpunk {
    background: black !important;
    color: #00ffee;
}
.cyberpunk .container {
    border: 1px solid #00ffee;
    box-shadow: 0 0 35px #00ffee;
}

.matrix-mode {
    background: black !important;
    color: #00ff88;
}
.matrix-mode .container {
    border: 1px solid #00ff88;
    box-shadow: 0 0 35px #00ff88;
}

@media(max-width: 900px) { .container { width: 94%; } }
@media(max-width: 600px) {
    body { overflow: auto; }
    .container { top: auto; transform: none; margin: 40px auto; border-radius: 22px; padding: 20px; }
    .mode-buttons { grid-template-columns: 1fr; }
    .stats { grid-template-columns: 1fr; }
    input, button { padding: 16px; font-size: 1rem; }
}
@media(max-width: 380px) {
    h1 { font-size: 2rem; }
    p { font-size: 0.9rem; }
}
</style>
</head>
<body>

<div class="loader">AURA</div>
<canvas id="bg"></canvas>

<div class="container">
    <h1>AURA</h1>
    <p id="welcome">Bienvenido a la experiencia interactiva</p>
    <input type="text" id="name" placeholder="Tu nombre">
    <input type="color" id="color">
    <button onclick="saveData()">Guardar memoria</button>

    <h2>Modo emocional</h2>
    <div class="mode-buttons">
        <button onclick="setMode('feliz')">Feliz</button>
        <button onclick="setMode('tranquilo')">Tranquilo</button>
        <button onclick="setMode('motivado')">Motivado</button>
        <button onclick="setMode('creativo')">Creativo</button>
        <button onclick="setMode('misterioso')">Misterioso</button>
    </div>

    <h2>IA AURA</h2>
    <div class="aura-ai">
        <p id="aiMessage">Hola humano... estoy observando tu energía digital.</p>
        <button onclick="speakAura()">Hablar con AURA</button>
        <button onclick="startVoice()">Activar voz</button>
    </div>

    <h2>Modo Matrix</h2>
    <button onclick="toggleMatrix()">Activar Matrix</button>

    <h2>Estadísticas</h2>
    <div class="stats">
        <p>Clicks: <span id="clickCount">0</span></p>
        <p>Movimientos: <span id="moveCount">0</span></p>
        <p>Tiempo: <span id="timeCount">0</span>s</p>
    </div>

    <h2>Modo automático</h2>
    <p id="timeMode">Detectando horario...</p>
</div>

<script>
// =============================================
// VARIABLES GLOBALES (declaradas una sola vez)
// =============================================
let matrixActive = false;     // Controla el modo Matrix
let matrixAnimation = null;   // ID de requestAnimationFrame del Matrix
let starsAnimation = null;    // ID de la animación de estrellas
let stars = [];               // Array de estrellas
let clicks = 0;
let moves = 0;
let seconds = 0;
let lastMoveTime = 0;
const MOVE_THROTTLE_MS = 100;

// =============================================
// MEMORIA LOCAL
// =============================================
window.onload = () => {
    const savedName = localStorage.getItem("auraName");
    const savedColor = localStorage.getItem("auraColor");
    if (savedName) {
        document.getElementById("welcome").innerHTML = `Hola ${savedName}, preparé una experiencia diferente para vos.`;
    }
    if (savedColor) {
        document.body.style.background = `linear-gradient(135deg, ${savedColor}, #000)`;
    }
};

function saveData() {
    const name = document.getElementById("name").value;
    const color = document.getElementById("color").value;
    localStorage.setItem("auraName", name);
    localStorage.setItem("auraColor", color);
    alert("Memoria guardada");
}

// =============================================
// MODOS EMOCIONALES (con corrección: si Matrix está activo, lo desactiva)
// =============================================
function setMode(mode) {
    const body = document.body;
    body.classList.remove("cyberpunk");
    // Si el modo Matrix está activo, lo desactivamos para que se vea el color
    if (matrixActive) {
        toggleMatrix();  // esto desactiva Matrix y reinicia las estrellas
    }
    switch (mode) {
        case "feliz": body.style.background = "linear-gradient(135deg,#f59e0b,#facc15)"; break;
        case "tranquilo": body.style.background = "linear-gradient(135deg,#0ea5e9,#1e3a8a)"; break;
        case "motivado": body.style.background = "linear-gradient(135deg,#ef4444,#7f1d1d)"; break;
        case "creativo": body.style.background = "linear-gradient(135deg,#8b5cf6,#ec4899)"; break;
        case "misterioso": body.style.background = "linear-gradient(135deg,#111827,#000000)"; break;
    }
}

// =============================================
// PARTÍCULAS AL MOVER EL MOUSE
// =============================================
document.addEventListener("mousemove", (e) => {
    const particle = document.createElement("div");
    particle.classList.add("particle");
    particle.style.left = e.clientX + "px";
    particle.style.top = e.clientY + "px";
    particle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
});

// =============================================
// MODO OCULTO (CYBERPUNK) - Teclado "aura"
// =============================================
let secret = [];
let secretTimeout;

document.addEventListener("keydown", (e) => {
    secret.push(e.key);
    if (secret.length > 10) secret.shift(); // Limitar tamaño
    clearTimeout(secretTimeout);
    secretTimeout = setTimeout(() => { secret = []; }, 3000);
    if (secret.join("").includes("aura")) {
        activateCyberpunk();
        secret = [];
        clearTimeout(secretTimeout);
    }
});

function activateCyberpunk() {
    document.body.classList.add("cyberpunk");
    alert("Modo oculto activado");
}

// =============================================
// IA AURA (texto y voz)
// =============================================
const auraMessages = [
    "Detecto creatividad en tu mente.",
    "Tu energía digital está aumentando.",
    "Bienvenido nuevamente al sistema AURA.",
    "Analizando emociones humanas...",
    "Modo futurista sincronizado.",
    "Tu presencia altera el entorno."
];

function speakAura() {
    const randomMessage = auraMessages[Math.floor(Math.random() * auraMessages.length)];
    document.getElementById("aiMessage").innerText = randomMessage;
    const voice = new SpeechSynthesisUtterance(randomMessage);
    voice.lang = "es-ES";
    speechSynthesis.speak(voice);
}

// =============================================
// FONDO DE ESTRELLAS (normal)
// =============================================
function initStars() {
    const canvas = document.getElementById("bg");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = 120;
    stars = [];
    for (let i = 0; i < count; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3
        });
    }
}

function animateStars() {
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    for (let star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        star.y += 0.3;
        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    }
    if (!matrixActive) {
        starsAnimation = requestAnimationFrame(animateStars);
    }
}

// =============================================
// MODO MATRIX (con gestión limpia de animaciones)
// =============================================
function startMatrix() {
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = new Array(columns).fill(1);
    const letters = "アァカサタナハマヤャラワ0123456789";
    
    function drawMatrix() {
        if (!matrixActive) return;
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff88";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
        matrixAnimation = requestAnimationFrame(drawMatrix);
    }
    drawMatrix();
}

function stopMatrix() {
    if (matrixAnimation) {
        cancelAnimationFrame(matrixAnimation);
        matrixAnimation = null;
    }
}

function toggleMatrix() {
    matrixActive = !matrixActive;
    document.body.classList.toggle("matrix-mode");
    if (matrixActive) {
        // Detener estrellas
        if (starsAnimation) {
            cancelAnimationFrame(starsAnimation);
            starsAnimation = null;
        }
        startMatrix();
    } else {
        stopMatrix();
        // Limpiar canvas y reiniciar estrellas
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        initStars();          // reinicia posición de estrellas con el tamaño actual
        animateStars();       // arranca de nuevo la animación de estrellas
    }
}

// =============================================
// ESTADÍSTICAS (con throttling de movimientos)
// =============================================
document.addEventListener("click", () => {
    clicks++;
    document.getElementById("clickCount").innerText = clicks;
});

document.addEventListener("mousemove", () => {
    const now = Date.now();
    if (now - lastMoveTime >= MOVE_THROTTLE_MS) {
        moves++;
        document.getElementById("moveCount").innerText = moves;
        lastMoveTime = now;
    }
});

setInterval(() => {
    seconds++;
    document.getElementById("timeCount").innerText = seconds;
}, 1000);

// =============================================
// DÍA / NOCHE AUTOMÁTICO
// =============================================
function autoTheme() {
    const hour = new Date().getHours();
    const timeText = document.getElementById("timeMode");
    timeText.innerText = (hour >= 6 && hour < 18) ? "Modo día activado" : "Modo noche activado";
}
autoTheme();

// =============================================
// RECONOCIMIENTO DE VOZ (compatible)
// =============================================
let recognition = null;
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = "es-ES";
    recognition.continuous = false;
    recognition.onresult = function(event) {
        const speech = event.results[0][0].transcript.toLowerCase();
        if (speech.includes("matrix")) toggleMatrix();
        if (speech.includes("feliz")) setMode("feliz");
        if (speech.includes("tranquilo")) setMode("tranquilo");
        if (speech.includes("creativo")) setMode("creativo");
        if (speech.includes("motivado")) setMode("motivado");
    };
    recognition.onerror = (e) => console.warn("Error voz:", e.error);
} else {
    const voiceBtn = document.querySelector("button[onclick='startVoice()']");
    if (voiceBtn) {
        voiceBtn.disabled = true;
        voiceBtn.style.opacity = "0.5";
        voiceBtn.title = "No soportado en este navegador";
    }
}

function startVoice() {
    if (recognition) recognition.start();
    else alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.");
}

// =============================================
// INICIALIZACIÓN FINAL (estrellas y resize)
// =============================================
function handleResize() {
    const canvas = document.getElementById("bg");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (!matrixActive) {
        // Reiniciar estrellas con nuevo tamaño
        if (starsAnimation) {
            cancelAnimationFrame(starsAnimation);
            starsAnimation = null;
        }
        initStars();
        animateStars();
    } else {
        // Si Matrix está activo, reiniciar la animación Matrix para que use nuevo tamaño
        if (matrixAnimation) {
            cancelAnimationFrame(matrixAnimation);
            startMatrix();
        }
    }
}

window.addEventListener("resize", handleResize);

// Arrancar todo
initStars();
animateStars();   // Inicia fondo de estrellas (Matrix desactivado por defecto)
</script>
</body>
</html>
