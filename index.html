<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AURA - Experiencia Inteligente</title>
<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* CORRECCIÓN: Flexbox en body para centrar el contenedor verticalmente */
html, body {
    height: 100%;
    width: 100%;
}

body {
    display: flex;
    align-items: center;      /* Centrado vertical */
    justify-content: center;  /* Centrado horizontal */
        flex-direction: column;
    align-items: center;      /* Centrado horizontal */
    justify-content: flex-start;  /* Contenido desde el top */
    min-height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a, #111827);
    color: white;
    transition: background 1s;
    overflow-x: hidden;
    overflow-y: auto;         /* Permitir scroll si el contenido es muy alto (útil en móvil) */
    position: relative;
    padding: 20px 0;
}

/* Canvas de fondo fijo */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;     /* Para que no interfiera con clics */
}

/* Loader */
.loader {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: clamp(2rem, 6vw, 4rem);
    z-index: 9999;
    animation: fadeOut 2s forwards;
    animation-delay: 2s;
}
@keyframes fadeOut {
    to { opacity: 0; visibility: hidden; }
}

/* Contenedor principal: ya no necesita top/transform, el body lo centra */
.container {
    width: min(92%, 950px);
    margin: 20px auto;        /* margen superior e inferior para separación en móvil */
    padding: clamp(20px, 4vw, 40px);
    border-radius: 30px;
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 40px rgba(255,255,255,0.08);
    text-align: center;
    /* El contenedor se adapta al contenido, y el body lo centra */
}

h1 { font-size: clamp(2.5rem, 7vw, 5rem); margin-bottom: 15px; }
h2 { margin-top: 25px; margin-bottom: 10px; font-size: clamp(1.2rem, 3vw, 2rem); }
p { color: #d1d5db; margin-bottom: 20px; line-height: 1.6; }

input, select, button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 15px;
    font-size: 1rem;
}

button {
    cursor: pointer;
    background: #38bdf8;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}
button:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(56,189,248,0.5); }
button:active { transform: scale(0.98); }

.mode-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 12px;
    margin-top: 15px;
}

.particle {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: particleFade 1s linear forwards;
}
@keyframes particleFade {
    to { transform: translateY(-25px) scale(0); opacity: 0; }
}

.aura-ai {
    margin-top: 25px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    animation: aiGlow 4s infinite alternate;
}
@keyframes aiGlow {
    from { box-shadow: 0 0 10px rgba(0,255,255,0.2); }
    to { box-shadow: 0 0 30px rgba(0,255,255,0.6); }
}

.stats {
    margin-top: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 15px;
}
.stats p {
    background: rgba(255,255,255,0.08);
    padding: 15px;
    border-radius: 15px;
    font-weight: bold;
}

/* Modos especiales */
.cyberpunk {
    background: black !important;
    color: #00ffee;
}
.cyberpunk .container {
    border: 1px solid #00ffee;
    box-shadow: 0 0 35px #00ffee;
}

.matrix-mode {
    background: black !important;
    color: #00ff88;
}
.matrix-mode .container {
    border: 1px solid #00ff88;
    box-shadow: 0 0 35px #00ff88;
}

/* Estilos para grabación de audio */
.recording-status {
    display: none;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    background: rgba(255, 0, 0, 0.2);
    border: 1px solid rgba(255, 0, 0, 0.5);
    color: #ff6b6b;
    font-weight: bold;
}

.recording-status.active {
    display: block;
    animation: recordingPulse 1s infinite;
}

@keyframes recordingPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

.audio-playback {
    margin: 15px 0;
    padding: 10px;
    background: rgba(0, 255, 255, 0.1);
    border-radius: 10px;
    border: 1px solid rgba(0, 255, 255, 0.3);
}

.audio-playback audio {
    width: 100%;
    margin: 10px 0;
}

    
/* Responsive: en móvil el contenedor ocupa más ancho y se separa del borde */
@media (max-width: 600px) {
    body {
        align-items: flex-start; /* permite que el contenido se desplace desde arriba */
        padding: 20px 0;
    }
    .container {
        width: 90%;
        margin: 0 auto;
        border-radius: 22px;
        padding: 20px;
    }
    .mode-buttons {
        grid-template-columns: 1fr;
    }
    .stats {
        grid-template-columns: 1fr;
    }
    input, button {
        padding: 16px;
        font-size: 1rem;
    }
    h1 { font-size: 2rem; }
    p { font-size: 0.9rem; }
}
</style>
</head>
<body>

<div class="loader">AURA</div>
<canvas id="bg"></canvas>

<div class="container">
    <h1>AURA</h1>
    <p id="welcome">Bienvenido a la experiencia interactiva</p>
    <input type="text" id="name" placeholder="Tu nombre">
    <input type="color" id="color">
    <button onclick="saveData()">Guardar memoria</button>

    <h2>Modo emocional</h2>
    <div class="mode-buttons">
        <button onclick="setMode('feliz')">Feliz</button>
        <button onclick="setMode('tranquilo')">Tranquilo</button>
        <button onclick="setMode('motivado')">Motivado</button>
        <button onclick="setMode('creativo')">Creativo</button>
        <button onclick="setMode('misterioso')">Misterioso</button>
    </div>

    <h2>IA AURA</h2>
    <div class="aura-ai">
        <p id="aiMessage">Hola humano... estoy observando tu energía digital.</p>
        <button onclick="speakAura()">Hablar con AURA</button>
        <button onclick="startVoice()">Activar voz</button>
        <button onclick="startVoice()">Activar grabación</button>
        <div class="recording-status" id="recordingStatus">🔴 Grabando...</div>
        <div class="audio-playback" id="audioPlayback" style="display: none;">
            <p>Tu grabación:</p>
            <audio id="audioElement" controls></audio>
        </div>
    </div>

    <h2>Modo Matrix</h2>
    <button onclick="toggleMatrix()">Activar Matrix</button>

    <h2>Estadísticas</h2>
    <div class="stats">
        <p>Clicks: <span id="clickCount">0</span></p>
        <p>Movimientos: <span id="moveCount">0</span></p>
        <p>Tiempo: <span id="timeCount">0</span>s</p>
    </div>

    <h2>Modo automático</h2>
    <p id="timeMode">Detectando horario...</p>
</div>

<script>
// =============================================
// VARIABLES GLOBALES
// =============================================
let matrixActive = false;
let matrixAnimation = null;
let starsAnimation = null;
let stars = [];
let clicks = 0;
let moves = 0;
let seconds = 0;
let lastMoveTime = 0;
const MOVE_THROTTLE_MS = 100;

// Variables para grabación de audio
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
    
// =============================================
// MEMORIA LOCAL
// =============================================
window.onload = () => {
    const savedName = localStorage.getItem("auraName");
    const savedColor = localStorage.getItem("auraColor");
    if (savedName) {
        document.getElementById("welcome").innerHTML = `Hola ${savedName}, preparé una experiencia diferente para vos.`;
    }
    if (savedColor) {
        document.body.style.background = `linear-gradient(135deg, ${savedColor}, #000)`;
    }
};

function saveData() {
    const name = document.getElementById("name").value;
    const color = document.getElementById("color").value;
    localStorage.setItem("auraName", name);
    localStorage.setItem("auraColor", color);
    alert("Memoria guardada");
}

// =============================================
// MODOS EMOCIONALES
// =============================================
function setMode(mode) {
    const body = document.body;
    body.classList.remove("cyberpunk");
    if (matrixActive) toggleMatrix();  // Desactiva Matrix para que se vea el color
    switch (mode) {
        case "feliz": body.style.background = "linear-gradient(135deg,#f59e0b,#facc15)"; break;
        case "tranquilo": body.style.background = "linear-gradient(135deg,#0ea5e9,#1e3a8a)"; break;
        case "motivado": body.style.background = "linear-gradient(135deg,#ef4444,#7f1d1d)"; break;
        case "creativo": body.style.background = "linear-gradient(135deg,#8b5cf6,#ec4899)"; break;
        case "misterioso": body.style.background = "linear-gradient(135deg,#111827,#000000)"; break;
    }
}

// =============================================
// PARTÍCULAS
// =============================================
document.addEventListener("mousemove", (e) => {
    const particle = document.createElement("div");
    particle.classList.add("particle");
    particle.style.left = e.clientX + "px";
    particle.style.top = e.clientY + "px";
    particle.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 1000);
});

// =============================================
// MODO OCULTO (CYBERPUNK)
// =============================================
let secret = [];
let secretTimeout;
document.addEventListener("keydown", (e) => {
    secret.push(e.key);
    if (secret.length > 10) secret.shift();
    clearTimeout(secretTimeout);
    secretTimeout = setTimeout(() => { secret = []; }, 3000);
    if (secret.join("").includes("aura")) {
        activateCyberpunk();
        secret = [];
        clearTimeout(secretTimeout);
    }
});
function activateCyberpunk() {
    document.body.classList.add("cyberpunk");
    alert("Modo oculto activado");
}

// =============================================
// IA AURA (VOZ)
// =============================================
const auraMessages = [
    "Detecto creatividad en tu mente.",
    "Tu energía digital está aumentando.",
    "Bienvenido nuevamente al sistema AURA.",
    "Analizando emociones humanas...",
    "Modo futurista sincronizado.",
    "Tu presencia altera el entorno."
];
function speakAura() {
    const randomMessage = auraMessages[Math.floor(Math.random() * auraMessages.length)];
    document.getElementById("aiMessage").innerText = randomMessage;
    const voice = new SpeechSynthesisUtterance(randomMessage);
    voice.lang = "es-ES";
    speechSynthesis.speak(voice);
}

// =============================================
// GRABACIÓN DE AUDIO
// =============================================
async function startVoice() {
    if (isRecording) {
        // Detener grabación
        stopRecording();
        return;
    }

    try {
        // Solicitar permiso para usar el micrófono
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Crear MediaRecorder
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        isRecording = true;

        // Mostrar estado de grabación
        document.getElementById("recordingStatus").classList.add("active");

        // Recopilar datos de audio
        mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
        };

        // Cuando finalice la grabación
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: "audio/wav" });
            const audioUrl = URL.createObjectURL(audioBlob);
            
            // Mostrar reproductor de audio
            const audioElement = document.getElementById("audioElement");
            audioElement.src = audioUrl;
            document.getElementById("audioPlayback").style.display = "block";
        };

        mediaRecorder.start();
        
        // Cambiar texto del botón
        const voiceBtn = document.querySelector("button[onclick='startVoice()']");
        voiceBtn.innerText = "Detener grabación";
        voiceBtn.style.background = "#ef4444";

    } catch (error) {
        console.error("Error al acceder al micrófono:", error);
        alert("No se pudo acceder al micrófono. Por favor, verifica los permisos.");
    }
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;

        // Detener todos los tracks del stream
        mediaRecorder.stream.getTracks().forEach(track => track.stop());

        // Ocultar estado de grabación
        document.getElementById("recordingStatus").classList.remove("active");

        // Restaurar botón
        const voiceBtn = document.querySelector("button[onclick='startVoice()']");
        voiceBtn.innerText = "Activar grabación";
        voiceBtn.style.background = "#38bdf8";
    }
}

// =============================================
// FONDO ESTRELLAS
// =============================================
function initStars() {
    const canvas = document.getElementById("bg");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const count = 120;
    stars = [];
    for (let i = 0; i < count; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3
        });
    }
}

function animateStars() {
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    for (let star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        star.y += 0.3;
        if (star.y > canvas.height) {
            star.y = 0;
            star.x = Math.random() * canvas.width;
        }
    }
    if (!matrixActive) {
        starsAnimation = requestAnimationFrame(animateStars);
    }
}

// =============================================
// MODO MATRIX
// =============================================
function startMatrix() {
    const canvas = document.getElementById("bg");
    const ctx = canvas.getContext("2d");
    if (!ctx) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const fontSize = 16;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = new Array(columns).fill(1);
    const letters = "アァカサタナハマヤャラワ0123456789";
    
    function drawMatrix() {
        if (!matrixActive) return;
        ctx.fillStyle = "rgba(0,0,0,0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff88";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
        matrixAnimation = requestAnimationFrame(drawMatrix);
    }
    drawMatrix();
}

function stopMatrix() {
    if (matrixAnimation) {
        cancelAnimationFrame(matrixAnimation);
        matrixAnimation = null;
    }
}

function toggleMatrix() {
    matrixActive = !matrixActive;
    document.body.classList.toggle("matrix-mode");
    if (matrixActive) {
        if (starsAnimation) {
            cancelAnimationFrame(starsAnimation);
            starsAnimation = null;
        }
        startMatrix();
    } else {
        stopMatrix();
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
        initStars();
        animateStars();
    }
}

// =============================================
// ESTADÍSTICAS
// =============================================
document.addEventListener("click", () => {
    clicks++;
    document.getElementById("clickCount").innerText = clicks;
});
document.addEventListener("mousemove", () => {
    const now = Date.now();
    if (now - lastMoveTime >= MOVE_THROTTLE_MS) {
        moves++;
        document.getElementById("moveCount").innerText = moves;
        lastMoveTime = now;
    }
});
setInterval(() => {
    seconds++;
    document.getElementById("timeCount").innerText = seconds;
}, 1000);

// =============================================
// DÍA/NOCHE
// =============================================
function autoTheme() {
    const hour = new Date().getHours();
    const timeText = document.getElementById("timeMode");
    timeText.innerText = (hour >= 6 && hour < 18) ? "Modo día activado" : "Modo noche activado";
}
autoTheme();

// =============================================
// RECONOCIMIENTO DE VOZ
// =============================================
let recognition = null;
if ('webkitSpeechRecognition' in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = "es-ES";
    recognition.continuous = false;
    recognition.onresult = function(event) {
        const speech = event.results[0][0].transcript.toLowerCase();
        if (speech.includes("matrix")) toggleMatrix();
        if (speech.includes("feliz")) setMode("feliz");
        if (speech.includes("tranquilo")) setMode("tranquilo");
        if (speech.includes("creativo")) setMode("creativo");
        if (speech.includes("motivado")) setMode("motivado");
    };
    recognition.onerror = (e) => console.warn("Error voz:", e.error);
} else {
    const voiceBtn = document.querySelector("button[onclick='startVoice()']");
    if (voiceBtn) {
        voiceBtn.disabled = true;
        voiceBtn.style.opacity = "0.5";
        voiceBtn.title = "No soportado en este navegador";
    }
}
function startVoice() {
    if (recognition) recognition.start();
    else alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.");
}

// =============================================
// AJUSTE DE RESIZE
// =============================================
function handleResize() {
    const canvas = document.getElementById("bg");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    if (!matrixActive) {
        if (starsAnimation) {
            cancelAnimationFrame(starsAnimation);
            starsAnimation = null;
        }
        initStars();
        animateStars();
    } else {
        if (matrixAnimation) {
            cancelAnimationFrame(matrixAnimation);
            startMatrix();
        }
    }
}
window.addEventListener("resize", handleResize);

// =============================================
// INICIALIZACIÓN
// =============================================
initStars();
animateStars();
</script>
</body>
</html>
